# Nginx-instelling voor mijnp2000.lab023.nl.
# Plaats dit als /etc/nginx/sites-available/mijnp2000 en activeer met een
# symlink naar sites-enabled. Stel daarna HTTPS in met Certbot.
#
# Deze pagina stuurt door naar de archief-backend (container mijnp2000-archief)
# die op deze server op poort 8200 luistert (alleen op localhost).
# Afgeschermd via de centrale aanmelding (oauth2-proxy, map mijnlogin).
#
# Let op: op de server bouwt Certbot dit bestand om naar een server-blok voor
# poort 443 met certificaatregels, plus een blok voor poort 80 dat alleen
# doorverwijst. De include-regel hoort in het 443-blok.

server {
    listen 80;
    server_name mijnp2000.lab023.nl;

    # Toegang alleen na inloggen (centrale aanmelding).
    include snippets/lab023-login.conf;

    location / {
        proxy_pass http://127.0.0.1:8200;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
